global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: observe-local
    environment: development

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerting-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets:
          - pushgateway:9091

  # Requires: docker compose --profile examples up -d
  - job_name: nestjs-example
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - nestjs-example:3001
        labels:
          service: nestjs-app

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889

# Optional: forward metrics to Datadog
# remote_write:
#   - url: https://app.datadoghq.com/api/v1/series?api_key=YOUR_API_KEY
